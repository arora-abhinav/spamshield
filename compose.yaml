services:
  fastapi:
    #Builds and runs my dockerfile
    build: ./Machine Learning/Naive Bayes model
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgreSQL@123
      POSTGRES_DB: postgres
    
    volumes:
      - ./Machine Learning/Naive Bayes model/Database/schema.pgsql:/docker-entrypoint-initdb.d/schema.sql
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: